name: Deploy to Dothome

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: npm run build

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: soccerline.dothome.co.kr
          username: soccerline
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: out/
          server-dir: /html/
          dangerous-clean-slate: false
