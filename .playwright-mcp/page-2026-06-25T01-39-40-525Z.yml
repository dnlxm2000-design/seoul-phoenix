      - generic [ref=e33]:
        - img [ref=e35]
        - generic [ref=e37]:
          - paragraph [ref=e38]: 서울피닉스 FC가 말레이시아 A1 세미프로 리그(AFL) 2025-2026 시즌을 14위로 마감했다. 한국 축구단 최초로 말레이시아 리그에 진출한 도전적인 시즌이었다.
          - paragraph [ref=e39]: 최종 성적은 4승 3무 20패, 승점 14점. 25경기에서 19골을 득점하고 95실점을 기록했다. 리그 최하위권으로 예상됐던 전망을 뒤집고 14위로 시즌을 마치며 가능성을 입증했다는 평가다.
          - paragraph [ref=e40]: 시즌 하이라이트는 단연 2월 15일 KDA FC(Kedah Darul Aman FC) 원정에서 거둔 6-1 대승이었다. 당시 서울피닉스는 전·후반 합쳐 6골을 터뜨리며 시즌 최다 득점 승리를 기록, 말레이시아 축구계에 강한 인상을 남겼다. 또한 9월 28일 홈 경기에서는 KDA FC를 상대로 2-0 완승을 거두기도 했다.
          - paragraph [ref=e41]: 팀 내 최다 득점자는 나이지리아 출신 공격수 세이두 이스마일라(Seidou Ismaila)로 8골을 기록하며 팀 공격을 이끌었다. 한국인 선수들도 고른 활약을 펼쳤다. 송영주, 최찬양이 각각 2골을 기록했고, 오상묵, 윤삼영, 최지윤도 1골씩을 추가했다.
          - paragraph [ref=e42]: 서울피닉스는 말레이시아 AFL 특약에 따라 경기당 최대 7명의 한국인 선수를 출전시킬 수 있었고, 이 제도를 적극 활용하며 한국과 말레이시아 축구의 가교 역할을 수행했다.
          - paragraph [ref=e43]: 이상진(Lee Sang-jin) 감독은 "첫 시즌임을 감안하면 선수들이 잘 싸워줬다. 매 경기 배우고 성장하는 모습을 보여줬고, 팀의 가능성을 확인했다"고 소감을 밝혔다. 이어 "다가오는 시즌에는 더 나은 전력으로 팬들 앞에 서겠다. 이 경험을 발판 삼아 반드시 리그 중상위권으로 도약하겠다"는 각오를 전했다.
          - paragraph [ref=e44]: 서울피닉스는 차기 시즌을 위해 보강 작업에 들어갈 예정이며, K3/K4 리그 방출 선수 및 유망주 영입을 통해 전력을 강화한다는 계획이다.
          - paragraph [ref=e45]: "[출처: a1semipro.com / Wikipedia]"
